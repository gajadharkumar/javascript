<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Cards</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    <header>
      <h1>Add User and View Cards</h1>
      <p>Use the form below to add a new user card with name, email, role and an image.</p>
    </header>

    <section class="form-section">
      <form id="userForm">
        <div class="form-field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Enter name" required />
        </div>

        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter email" required />
        </div>

        <div class="form-field">
          <label for="role">Role</label>
          <input type="text" id="role" name="role" placeholder="Enter role" required />
        </div>

        <div class="form-field">
          <label for="image">Image URL</label>
          <input type="url" id="image" name="image" placeholder="Enter image URL" required />
        </div>

        <button type="submit" class="submit-btn">Add User Card</button>
      </form>
    </section>

    <section class="cards-section">
      <div class="cards-grid" id="cardsGrid">
        <!-- Cards will be rendered here by JavaScript -->
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
