<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: #fff;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.form h2 {
    text-align: center;
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
    display: flex;
    flex-direction: column;
}

.input-group label {
    margin-bottom: 5px;
    font-weight: bold;
}

.input-group input {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    outline: none;
    transition: 0.3s;
}

.input-group input:focus {
    border-color: #667eea;
}

.error {
    color: red;
    font-size: 12px;
    height: 14px;
    margin-top: 3px;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    background: #667eea;
    color: #fff;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
}
</style>
<body>

<div class="container">
    <form class="form" id="form">
        <h2>Login</h2>

        <div class="input-group">
            <label>Email</label>
            <input type="text" id="email" placeholder="Enter your email">
            <small class="error"></small>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
            <small class="error"></small>
        </div>

        <button type="submit">Submit</button>
    </form>
</div>
   <script src="script.js"></script>
</body>
</html>
