<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS Events Demo</title>
</head>
<body>

<h2>JavaScript Events Demo</h2>

<button id="btn">Click Me</button>
<div id="box" style="width:200px;height:100px;background:lightblue;margin:10px 0;">
  Hover Me
</div>

<input type="text" id="input" placeholder="Type here">
<br><br>

<select id="select">
  <option value="">Choose</option>
  <option value="JS">JavaScript</option>
  <option value="HTML">HTML</option>
</select>

<form id="form">
  <br>
  <button type="submit">Submit</button>
</form>

<div id="drag" draggable="true" style="width:100px;height:50px;background:red;">
  Drag Me
</div>

<div id="drop" style="width:200px;height:100px;background:lightgray;margin-top:10px;">
  Drop Here
</div>

<!-- Link JS -->
<script src="script.js"></script>

</body>
</html>
